<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Pulse — Blood Request</title>
  <meta name="description" content="Submit an urgent blood request." />
  <link rel="manifest" href="/manifest.json" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/static/css/dashboard-luxury.css" />
  <style>
    /* Radio Button Urgency */
    .urgency-selector { display: flex; gap: 12px; }
    .urgency-opt { display: none; }
    .urgency-selector label {
      flex: 1; padding: 12px; border: 1px solid var(--border-subtle); border-radius: 8px;
      text-align: center; cursor: pointer; background: rgba(255,255,255,0.02); transition: all 0.3s;
      font-family: var(--font-mono); font-size: 13px; color: var(--text-muted);
    }
    .urgency-opt:checked + label {
      border-color: var(--crimson); background: rgba(210,0,26,0.1); color: #FFF; box-shadow: 0 0 10px rgba(210,0,26,0.2);
    }
    .nearest-card {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border-subtle); padding: 16px; border-radius: 8px;
      display: flex; align-items: center; gap: 16px; margin-top: 12px;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="luxury-sidebar">
    <div class="brand">
      <div class="brand-pulse"></div>
      Red <span>Pulse</span>
    </div>
    
    <nav class="nav-menu">
      <a href="/dashboard" class="nav-link">Dashboard</a>
      <a href="/register" class="nav-link">Donor Base</a>
      <a href="/request" class="nav-link active">Transfusions</a>
      <a href="/sos" class="nav-link">Emergency SOS</a>
    </nav>
    
    <div class="sidebar-bottom">
      <div class="emergency-alert">
        <div>
          <div class="emer-text">Response Status</div>
          <div class="emer-count" style="font-size:16px;">READY</div>
        </div>
        <div class="brand-pulse" style="width:12px; height:12px; animation-duration:1s;"></div>
      </div>
    </div>
  </aside>

  <!-- Main Area -->
  <main class="main-wrapper">
    <!-- Top Banner -->
    <div class="ecg-banner" style="justify-content: flex-start; padding-left: 40px;">
      <div class="ecg-title">Transfusion Request System</div>
    </div>

    <!-- Content Container -->
    <div class="dashboard-container">
      
      <div class="form-card">
        <div class="form-title">Medical Request Form</div>
        <div class="form-subtitle">Submit the urgent request parameters. Our network will instantly scan for matching donors and regional vaults.</div>

        <form id="request-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="req-patient">Patient Name *</label>
              <input type="text" id="req-patient" placeholder="Patient's full name" required />
            </div>
            <div class="form-group">
              <label for="req-phone">Contact Phone</label>
              <input type="tel" id="req-phone" placeholder="e.g. 9876543210" />
            </div>
            <div class="form-group">
              <label for="req-blood">Blood Type Required *</label>
              <select id="req-blood" required>
                <option value="">— Select —</option>
                <option>O-</option><option>O+</option><option>A-</option><option>A+</option>
                <option>B-</option><option>B+</option><option>AB-</option><option>AB+</option>
              </select>
            </div>
            <div class="form-group">
              <label for="req-units">Units Needed *</label>
              <input type="number" id="req-units" placeholder="e.g. 2" min="1" required />
            </div>
            <div class="form-group full">
              <label for="req-hospital">Hospital Name</label>
              <input type="text" id="req-hospital" placeholder="e.g. Apollo Hospital, New Delhi" />
            </div>
            <div class="form-group full">
              <label>Urgency Threshold</label>
              <div class="urgency-selector">
                <input type="radio" name="urgency" id="u-low" value="low" class="urgency-opt" />
                <label for="u-low">LOW</label>
                <input type="radio" name="urgency" id="u-medium" value="medium" class="urgency-opt" checked />
                <label for="u-medium">MEDIUM</label>
                <input type="radio" name="urgency" id="u-critical" value="critical" class="urgency-opt" />
                <label for="u-critical">CRITICAL</label>
                <input type="radio" name="urgency" id="u-sos" value="SOS" class="urgency-opt" />
                <label for="u-sos" style="color:var(--critical-color);">S.O.S</label>
              </div>
            </div>
            <div class="form-group full">
              <label>Hospital Coordinates</label>
              <div style="display:flex;gap:16px;align-items:center;">
                <input type="text" id="req-lat" placeholder="Latitude" readonly style="flex:1;" />
                <input type="text" id="req-lng" placeholder="Longitude" readonly style="flex:1;" />
                <button type="button" class="btn btn-outline" onclick="detectHospitalLocation()" style="width:120px;">📍 Detect</button>
              </div>
            </div>
          </div>

          <div style="margin-top:40px;display:flex;gap:16px;flex-wrap:wrap; border-top:1px solid var(--border-subtle); padding-top:24px;">
            <button type="submit" class="btn btn-primary" id="req-submit-btn">Transmit Request</button>
            <button type="button" class="btn btn-outline" onclick="findNearest()">Scan For Nearest Banks</button>
            <button type="reset" class="btn btn-outline">Reset</button>
          </div>
          <div id="req-msg" style="margin-top:16px;font-size:14px; font-family:var(--font-mono);"></div>
        </form>

        <!-- Nearest Results -->
        <div id="nearest-results" style="margin-top:24px;display:none;">
          <h3 style="font-family:var(--font-serif); font-size:20px; color:#FFF; margin-bottom:12px;">Nearest Monitored Banks</h3>
          <div id="nearest-list"></div>
        </div>
      </div>
      
    </div>
  </main>
  
  <div id="toast-container" style="position:fixed; bottom:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px;"></div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="/static/js/global_sos.js"></script>
  <script>
    function detectHospitalLocation() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(pos => {
        document.getElementById('req-lat').value = pos.coords.latitude.toFixed(6);
        document.getElementById('req-lng').value = pos.coords.longitude.toFixed(6);
      });
    }

    async function findNearest() {
      const lat = document.getElementById('req-lat').value;
      const lng = document.getElementById('req-lng').value;
      if (!lat || !lng) { alert('Please detect coordinates first.'); return; }

      try {
        const banks = await fetch(`/api/banks/nearest?lat=${lat}&lng=${lng}`).then(r => r.json());
        const container = document.getElementById('nearest-results');
        const list = document.getElementById('nearest-list');
        container.style.display = 'block';

        if (!banks.length) {
          list.innerHTML = '<p style="color:var(--text-muted); font-family:var(--font-mono); font-size:14px;">NO BANKS IN 25KM RADIUS.</p>';
          return;
        }

        list.innerHTML = banks.map(b => `
          <div class="nearest-card">
            <div style="font-size:24px;">🏥</div>
            <div>
              <div style="font-family:var(--font-serif); color:#FFF; font-size:16px;">${b.name}</div>
              <div style="font-family:var(--font-mono); color:var(--text-muted); font-size:12px;">Distance: ${b.distance_km} km</div>
            </div>
          </div>`).join('');
      } catch (e) {
        console.error(e);
      }
    }

    document.getElementById('request-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const urgency = document.querySelector('input[name="urgency"]:checked')?.value || 'medium';
      const btn = document.getElementById('req-submit-btn');
      btn.textContent = 'Transmitting…'; btn.disabled = true;

      const payload = {
        patient_name: document.getElementById('req-patient').value,
        blood_type: document.getElementById('req-blood').value,
        units_needed: parseInt(document.getElementById('req-units').value),
        hospital_name: document.getElementById('req-hospital').value,
        hospital_latitude: parseFloat(document.getElementById('req-lat').value) || null,
        hospital_longitude: parseFloat(document.getElementById('req-lng').value) || null,
        urgency_level: urgency,
        requester_phone: document.getElementById('req-phone').value
      };

      const endpoint = urgency === 'SOS' ? '/api/sos/trigger' : '/api/requests/new';

      if (urgency === 'SOS') {
        payload.units = payload.units_needed;
        payload.lat = payload.hospital_latitude;
        payload.lng = payload.hospital_longitude;
        payload.contact_phone = payload.requester_phone;
      }

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        const msg = document.getElementById('req-msg');
        if (res.ok) {
          const donorsAlerted = data.donors_alerted ? ` — [${data.donors_alerted} DONORS ALERTED]` : '';
          msg.style.color = 'var(--ok-color)';
          msg.textContent = `SUCCESS: ${data.message.toUpperCase()}${donorsAlerted}`;
          e.target.reset();
        } else {
          msg.style.color = 'var(--critical-color)';
          msg.textContent = 'ERROR: ' + (data.error || 'TRANSMISSION FAILED');
        }
      } catch (err) {
        document.getElementById('req-msg').textContent = 'NETWORK ERROR.';
      } finally {
        btn.textContent = 'Transmit Request'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
