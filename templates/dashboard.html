<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Pulse — Live Dashboard</title>
  <meta name="description" content="Red Pulse Medical Network Dashboard." />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/static/icons/app-icon.png" type="image/png">
  <link rel="apple-touch-icon" href="/static/icons/app-icon.png">

  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/static/css/dashboard-luxury.css" />

  <!-- Bottom Tab Navigation -->
  <nav class="bottom-tab-nav">
    <a href="/dashboard" class="tab-link active">
      <div class="tab-icon">📊</div>
      <div class="tab-label">Dashboard</div>
    </a>
    <a href="/register" class="tab-link ">
      <div class="tab-icon">👤</div>
      <div class="tab-label">Register Donor</div>
    </a>
    <a href="/request" class="tab-link ">
      <div class="tab-icon">💉</div>
      <div class="tab-label">Blood Request</div>
    </a>
    <a href="/sos" class="tab-link ">
      <div class="tab-icon">🆘</div>
      <div class="tab-label">SOS System</div>
    </a>
    <a href="/dashboard" class="tab-link">
      <div class="tab-icon">🔮</div>
      <div class="tab-label">AI Forecast</div>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

  <!-- Top Navbar -->
  <header class="luxury-navbar">
    <div class="brand">
      <div class="brand-pulse"></div>
      Red <span>Pulse</span>
    </div>
    
    
    
    <div class="navbar-right">
      <div class="real-time-clock" id="live-clock">
        00:00 <span class="clock-pulse"></span>
      </div>
      <div class="emergency-indicator">
        🔴 <span id="critical-alert-count">0</span> CRITICAL
      </div>
    </div>

    
  </header>

  <!-- Main Area -->
  <main class="main-wrapper">
    <!-- Live ECG Banner -->
    <div class="ecg-banner">
      <div class="ecg-title">Live System Rhythm</div>
      <div class="ecg-waveform">
        <svg class="ecg-svg" preserveAspectRatio="none" viewBox="0 0 1000 40">
          <path class="ecg-line" d="M0,20 L200,20 L210,10 L220,30 L230,20 L400,20 L420,-10 L440,50 L460,20 L650,20 L660,10 L670,30 L680,20 L850,20 L870,0 L890,40 L910,20 L1000,20" />
        </svg>
      </div>
      <div class="bpm-display">
        BPM <span class="bpm-val" id="bpm-val">72</span>
      </div>
    </div>

    <!-- Content Container -->
    <div class="dashboard-container">
      
      <!-- 4 Stat Cards -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Units</div>
          <div class="stat-value" id="total-units-count">–</div>
        </div>
        <div class="stat-card crimson">
          <div class="stat-label">Critical Protocols</div>
          <div class="stat-value" style="color: var(--crimson);" id="critical-types-count">–</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Ready Donors</div>
          <div class="stat-value" id="available-donors-count">–</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active Transfusions</div>
          <div class="stat-value" id="active-requests-count">–</div>
        </div>
      </div>

      <!-- Inventory Grid -->
      <div class="section-head">
        <div>Blood Inventory</div>
        <div class="section-meta">LIVE STOCK</div>
      </div>
      
      <div class="inventory-grid" id="blood-inventory-grid">
        <!-- JS Injected -->
      </div>
      
      <!-- Bottom Section -->
      <div class="bottom-grid">
        <!-- Live Activity Feed -->
        <div class="panel">
          <div class="section-head" style="font-size: 18px; padding-bottom: 12px; margin-bottom:16px;">
            <div>Live Activity</div>
            <div class="section-meta">FEED</div>
          </div>
          <div class="feed-list" id="activity-feed">
             <!-- JS Injected -->
          </div>
        </div>
        
        <!-- AI Chart -->
        <div class="panel">
          <div class="section-head" style="font-size: 18px; padding-bottom: 12px; margin-bottom:16px; border:none; justify-content:space-between; align-items:center;">
             <span>Demand Forecast</span>
             <select id="forecast-blood-type" onchange="loadForecast(this.value)" style="width: auto; background:var(--bg-panel); color:var(--text-main); border:1px solid var(--border-subtle); padding:4px 8px; border-radius:4px; font-family:var(--font-mono); outline:none;">
               <option>O+</option><option>O-</option><option>A+</option><option>A-</option>
               <option>B+</option><option>B-</option><option>AB+</option><option>AB-</option>
             </select>
          </div>
          <div style="flex:1; position:relative;">
             <canvas id="forecast-chart"></canvas>
          </div>
        </div>
      </div>
      
    </div>
  </main>
  
  <div id="toast-container" style="position:fixed; bottom:20px; left:20px; z-index:9999; display:flex; flex-direction:column; gap:8px;"></div>

  <!-- Scripts -->
  <script src="/static/js/dashboard.js"></script>
  <script src="/static/js/global_sos.js"></script>
</body>
</html>
