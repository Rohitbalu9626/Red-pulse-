<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Pulse — Donor Base</title>
  <meta name="description" content="Register as a blood donor." />
  <link rel="manifest" href="/manifest.json" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/static/css/dashboard-luxury.css" />
</head>
<body>

  <!-- Top Navbar -->
  <header class="luxury-navbar">
    <div class="brand">
      <div class="brand-pulse"></div>
      Red <span>Pulse</span>
    </div>
    
    <nav class="nav-menu" id="mobile-nav">
      <a href="/dashboard" class="nav-link">Dashboard</a>
      <a href="/register" class="nav-link active">Donor Base</a>
      <a href="/request" class="nav-link">Transfusions</a>
      <a href="/sos" class="nav-link">Emergency SOS</a>
    </nav>
    
    <div class="navbar-right">
      <div class="real-time-clock" id="live-clock">
        00:00 <span class="clock-pulse"></span>
      </div>
      <div class="emergency-indicator">
        🔴 <span id="critical-alert-count">0</span> CRITICAL
      </div>
    </div>

    <button class="mobile-toggle" onclick="document.getElementById('mobile-nav').classList.toggle('open')">☰</button>
  </header>

  <!-- Main Area -->
  <main class="main-wrapper">

    <!-- Content Container -->
    <div class="dashboard-container">
      
      <div class="form-card">
        <div class="form-title">Donor Registration</div>
        <div class="form-subtitle">Your data is secured directly in the medical network. Used for life-saving matches only.</div>

        <form id="donor-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="donor-name">Full Name *</label>
              <input type="text" id="donor-name" placeholder="e.g. Priya Sharma" required />
            </div>
            <div class="form-group">
              <label for="donor-phone">Phone Number *</label>
              <input type="tel" id="donor-phone" placeholder="e.g. 9876543210" required />
            </div>
            <div class="form-group">
              <label for="donor-email">Email Address</label>
              <input type="email" id="donor-email" placeholder="optional, for SOS emails" />
            </div>
            <div class="form-group">
              <label for="donor-blood">Blood Type *</label>
              <select id="donor-blood" required>
                <option value="">— Select —</option>
                <option>O-</option><option>O+</option><option>A-</option><option>A+</option>
                <option>B-</option><option>B+</option><option>AB-</option><option>AB+</option>
              </select>
            </div>
            <div class="form-group">
              <label for="donor-city">City</label>
              <input type="text" id="donor-city" placeholder="e.g. Delhi" />
            </div>
            <div class="form-group">
              <label for="donor-health">Health Status</label>
              <select id="donor-health">
                <option value="fit">Fit — ready to donate</option>
                <option value="pending">Pending — under review</option>
                <option value="deferred">Deferred — temporarily ineligible</option>
              </select>
            </div>
            <div class="form-group full">
              <label>Location Coordinates</label>
              <div style="display:flex;gap:16px;align-items:center;">
                <input type="text" id="donor-lat" placeholder="Latitude" readonly style="flex:1;" />
                <input type="text" id="donor-lng" placeholder="Longitude" readonly style="flex:1;" />
                <button type="button" class="btn btn-outline" id="detect-btn" onclick="detectLocation()" style="width:120px;">📍 Detect</button>
              </div>
              <p id="location-status" style="font-size:12px;color:var(--text-muted);margin-top:8px;"></p>
            </div>
          </div>

          <div style="margin-top:40px;display:flex;gap:16px;align-items:center; border-top:1px solid var(--border-subtle); padding-top:24px;">
            <button type="submit" class="btn btn-primary" id="submit-btn" style="width:200px;">Register Donor</button>
            <button type="reset" class="btn btn-outline">Clear Form</button>
          </div>
          <div id="form-msg" style="margin-top:16px;font-size:14px; font-family:var(--font-mono);"></div>
        </form>
      </div>
      
    </div>
  </main>
  
  <div id="toast-container" style="position:fixed; bottom:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px;"></div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="/static/js/global_sos.js"></script>
  <script>
    function detectLocation() {
      const btn = document.getElementById('detect-btn');
      const status = document.getElementById('location-status');
      btn.textContent = '⏳ Wait…';
      btn.disabled = true;

      if (!navigator.geolocation) {
        status.textContent = 'Geolocation not supported.';
        btn.textContent = '📍 Detect'; btn.disabled = false;
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          document.getElementById('donor-lat').value = pos.coords.latitude.toFixed(6);
          document.getElementById('donor-lng').value = pos.coords.longitude.toFixed(6);
          status.style.color = 'var(--ok-color)';
          status.textContent = 'LOCATION SYNCED';
          btn.textContent = '📍 Detect'; btn.disabled = false;
        },
        () => {
          status.style.color = 'var(--critical-color)';
          status.textContent = 'LOCATION FAILED. ENTER MANUALLY.';
          document.getElementById('donor-lat').removeAttribute('readonly');
          document.getElementById('donor-lng').removeAttribute('readonly');
          btn.textContent = '📍 Detect'; btn.disabled = false;
        }
      );
    }

    document.getElementById('donor-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.textContent = 'Registering…'; btn.disabled = true;

      const payload = {
        name: document.getElementById('donor-name').value,
        phone: document.getElementById('donor-phone').value,
        email: document.getElementById('donor-email').value,
        blood_type: document.getElementById('donor-blood').value,
        city: document.getElementById('donor-city').value,
        health_status: document.getElementById('donor-health').value,
        latitude: parseFloat(document.getElementById('donor-lat').value) || null,
        longitude: parseFloat(document.getElementById('donor-lng').value) || null,
        is_available: true
      };

      try {
        const res = await fetch('/api/donors/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        const msg = document.getElementById('form-msg');
        if (res.ok) {
          msg.style.color = 'var(--ok-color)';
          msg.textContent = `SUCCESS: DONOR_ID #${data.donor_id} REGISTRED`;
          e.target.reset();
        } else {
          msg.style.color = 'var(--critical-color)';
          msg.textContent = 'ERROR: ' + (data.error || 'REGISTRATION FAILED');
        }
      } catch (err) {
        document.getElementById('form-msg').textContent = 'NETWORK ERROR.';
      } finally {
        btn.textContent = 'Register Donor'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
